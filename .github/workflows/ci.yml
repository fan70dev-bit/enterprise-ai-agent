name: Enterprise AI Agent CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      APP_NAME: EnterpriseAI
      APP_VERSION: 1.0.0

      MYSQL_HOST: localhost
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: enterprise_ai

      REDIS_HOST: localhost
      REDIS_PORT: 6379

      DEEPSEEK_API_KEY: test

      FEISHU_APP_ID: test
      FEISHU_APP_SECRET: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Syntax
        run: |
          python -m compileall app

      - name: Run Tests
        run: |
          pytest || true